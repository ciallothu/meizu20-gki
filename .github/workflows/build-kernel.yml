name: Build Meizu 20 GKI Kernel

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: Build strategy. auto uses branch A or B.
        required: true
        default: auto
        type: choice
        options: [auto, A, B]
      feature_set:
        description: Kernel feature set to build.
        required: true
        default: full
        type: choice
        options: [minimal, droidspaces, full]
      gki_tag:
        description: Android common kernel tag to build.
        required: true
        default: android13-5.15-2025-12_r5
      kernel_format:
        description: Kernel image format for AnyKernel3 zip and boot repack.
        required: true
        default: Image
        type: choice
        options: [Image, Image.gz, Image.lz4]
      stock_boot_url:
        description: Optional direct URL to stock boot.img template for fastboot flashable boot-stock-template-*.img.
        required: false
        default: ""
      create_release:
        description: Create GitHub prerelease with artifacts.
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ inputs.feature_set }} strategy ${{ inputs.strategy }} on ${{ github.ref_name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout build recipe
        uses: actions/checkout@v4

      - name: Resolve build variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          strategy="${{ inputs.strategy }}"
          if [[ "${strategy}" == "auto" ]]; then
            case "${GITHUB_REF_NAME}" in
              B) strategy="B" ;;
              *) strategy="A" ;;
            esac
          fi
          if [[ "${strategy}" != "A" && "${strategy}" != "B" ]]; then
            echo "Invalid strategy: ${strategy}" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA::7}"
          tag_name="pr-${GITHUB_RUN_NUMBER}-${short_sha}-${{ inputs.feature_set }}-${strategy}"
          echo "strategy=${strategy}" >> "${GITHUB_OUTPUT}"
          echo "feature_set=${{ inputs.feature_set }}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "gki_tag=${{ inputs.gki_tag }}" >> "${GITHUB_OUTPUT}"
          echo "kernel_format=${{ inputs.kernel_format }}" >> "${GITHUB_OUTPUT}"

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev lz4 python3 rsync unzip wget zip
          mkdir -p "${HOME}/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > "${HOME}/bin/repo"
          chmod a+x "${HOME}/bin/repo"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Sync Android common kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p workspace
          cd workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15 --depth=1
          repo sync -c -j"$(nproc)" --no-clone-bundle --no-tags
          cd common
          git fetch --depth=1 https://android.googlesource.com/kernel/common "refs/tags/${{ steps.vars.outputs.gki_tag }}"
          git checkout FETCH_HEAD

      - name: Integrate selected kernel features
        shell: bash
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/integrate_kernel_features.sh" \
            "${{ steps.vars.outputs.feature_set }}" \
            "${{ steps.vars.outputs.strategy }}" \
            "${GITHUB_WORKSPACE}/workspace/common" \
            "${GITHUB_WORKSPACE}"

      - name: Build kernel
        shell: bash
        run: |
          set -euo pipefail
          cd workspace
          crc_overrides="${GITHUB_WORKSPACE}/workspace/common/.meizu_crc_overrides.tsv"
          dist="${GITHUB_WORKSPACE}/workspace/out/kernel_aarch64/dist"
          mkdir -p "${dist}"
          tools/bazel run \
            --config=local \
            --verbose_failures \
            --action_env=KBUILD_BUILD_VERSION=1 \
            --action_env=KBUILD_BUILD_USER=build-user \
            --action_env=KBUILD_BUILD_HOST=build-host \
            --action_env=KBUILD_BUILD_TIMESTAMP="Tue Jan 27 20:32:22 UTC 2026" \
            --action_env=KBUILD_CRC_OVERRIDES="${crc_overrides}" \
            //common:kernel_aarch64_dist -- --dist_dir="${dist}"

      - name: Prepare artifacts and reports
        shell: bash
        env:
          KERNEL_FORMAT: ${{ steps.vars.outputs.kernel_format }}
          STOCK_BOOT_URL: ${{ inputs.stock_boot_url }}
        run: |
          set -euo pipefail
          dist="${GITHUB_WORKSPACE}/workspace/out/kernel_aarch64/dist"
          artifacts="${GITHUB_WORKSPACE}/artifacts"
          reports="${artifacts}/reports"
          mkdir -p "${artifacts}" "${reports}"

          if [[ ! -f "${dist}/Image.gz" ]]; then gzip -cn "${dist}/Image" > "${dist}/Image.gz"; fi
          if [[ ! -f "${dist}/Image.lz4" ]]; then lz4 -12 -l "${dist}/Image" "${dist}/Image.lz4"; fi

          if [[ ! -f "${dist}/Module.symvers" ]]; then
            symvers_path="$(find "${GITHUB_WORKSPACE}/workspace" -type f \( -name 'Module.symvers' -o -name '*Module.symvers' -o -name 'vmlinux.symvers' \) | head -n 1 || true)"
            if [[ -n "${symvers_path}" ]]; then cp "${symvers_path}" "${dist}/Module.symvers"; else echo "Module.symvers was not found in workspace output" > "${dist}/Module.symvers"; fi
          fi

          config_path="$(find "${GITHUB_WORKSPACE}/workspace/out" -type f \( -name '.config' -o -name 'kernel.config' -o -name 'kernel_aarch64_config' \) | head -n 1 || true)"
          if [[ -n "${config_path}" ]]; then cp "${config_path}" "${artifacts}/kernel.config"; cp "${config_path}" "${dist}/kernel.config"; else echo "kernel config was not found in workspace/out" > "${artifacts}/kernel.config"; cp "${artifacts}/kernel.config" "${dist}/kernel.config"; fi

          cp "${dist}/Image" "${artifacts}/Image"
          cp "${dist}/Image.gz" "${artifacts}/Image.gz"
          cp "${dist}/Image.lz4" "${artifacts}/Image.lz4"
          cp "${dist}/Module.symvers" "${artifacts}/Module.symvers"

          stock_boot=""
          if [[ -n "${STOCK_BOOT_URL}" ]]; then
            stock_boot="${artifacts}/stock-boot-template.img"
            curl -fL "${STOCK_BOOT_URL}" -o "${stock_boot}"
          fi

          python3 "${GITHUB_WORKSPACE}/scripts/generate_reports.py" \
            "${{ steps.vars.outputs.strategy }}" "${dist}" "${GITHUB_WORKSPACE}/data" "${reports}" "${{ steps.vars.outputs.gki_tag }}"

          KERNEL_FORMAT="${KERNEL_FORMAT}" bash "${GITHUB_WORKSPACE}/scripts/package_anykernel.sh" \
            "${{ steps.vars.outputs.strategy }}" "${dist}" "${GITHUB_WORKSPACE}" "${artifacts}"

          bash "${GITHUB_WORKSPACE}/scripts/collect_fastboot_boot_images.sh" \
            "${dist}" "${artifacts}" "${reports}" "${KERNEL_FORMAT}" "${stock_boot}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Meizu20-GKI-${{ steps.vars.outputs.feature_set }}-${{ steps.vars.outputs.strategy }}-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: error

      - name: Create prerelease
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(artifacts/AnyKernel3-Meizu20-${{ steps.vars.outputs.strategy }}.zip artifacts/Image artifacts/Image.gz artifacts/Image.lz4 artifacts/Module.symvers artifacts/kernel.config artifacts/boot*.img artifacts/*boot*.img artifacts/reports/*.txt)
          gh release create "${{ steps.vars.outputs.tag_name }}" "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --prerelease \
            --title "${{ steps.vars.outputs.tag_name }}" \
            --notes-file "artifacts/reports/release-notes.md"
